version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing Maven...
  build:
    commands:
      - echo Building, Testing and packaging the application...
      - mvn clean package -DskipTests
  post_build:
    commands:
      - echo Build completed.
      - echo Packaging JAR into ZIP for Elastic Beanstalk...
      - cd target
      - zip -r spring-app.zip *.jar
      - cd ..

artifacts:
  files:
    - target/spring-app.zip
  discard-paths: yes

cache:
  paths:
    - '/root/.m2/**/*'