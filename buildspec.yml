version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing Maven...
  build:
    commands:
      - echo Building, Testing and packaging the application...
      - ./mvnw clean package -DskipTests
  post_build:
    commands:
      - echo Build completed.
      - echo Moving JAR to root for Elastic Beanstalk...
      - cp target/*.jar .

artifacts:
  files:
    - "*.jar"
  discard-paths: yes

cache:
  paths:
    - '/root/.m2/**/*'